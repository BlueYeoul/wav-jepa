# W-JEPA Audio Pre-training Configuration (Base Model)
# Adapted from V-JEPA 2.1 for the audio domain (LibriSpeech).
#
# Key design choices:
#   - RoPE positional encoding (no learned pos_embed, handles variable length natively)
#   - Wav2Vec2 CNN feature extractor, fixed stride=320 (20ms/token at 16kHz)
#   - Variable-length audio: 0.5s – 20s per sample (LibriSpeech ~1-30s)
#   - Padding at batch level; masks stay within each sample's valid token range

app: wjepa_audio
folder: ./train/librispeech_pretrain/

data:
  dataset_type: DynamicAudioDataset
  datasets:
    - /data/LibriSpeech
  sample_rate: 16000
  batch_size: 16
  num_workers: 8
  pin_mem: true
  dynamic_seq_len:
    enabled: true
    min_seq_len_sec: 2.0      # 2.0s = 32000 samples → ~100 tokens
    max_seq_len_sec: 12.0     # 12s  = 192000 samples → ~1200 tokens
  dynamic_mask:
    enabled: False
    min_mask_ratio: 0.15
    max_mask_ratio: 0.5
    warmup_epochs: 20

# Two mask configurations (Meta V-JEPA 2.1 style):
#   cfg1: many small blocks  → diverse context
#   cfg2: one large block    → aggressive masking
mask:
  - num_blocks: 8
    scale: [0.15, 0.5]
    max_keep: null
    full_complement: false
    max_temporal_keep: 1.0
    inv_block: false
  - num_blocks: 2
    scale: [0.7, 0.7]
    max_keep: null
    full_complement: false
    max_temporal_keep: 1.0
    inv_block: false

meta:
  dtype: float32
  load_checkpoint: false
  read_checkpoint: null
  save_every_freq: 50
  seed: 42
  use_sdpa: true
  sync_gc: false

model:
  model_name: audio_transformer_base   # 768-dim, 12 layers
  pred_depth: 4
  pred_embed_dim: 384
  pred_num_heads: null                 # inherit from encoder if null
  # RoPE: no learned positional embedding → arbitrary length support
  use_mask_tokens: true
  zero_init_mask_tokens: true
  is_causal: false
  pred_is_causal: false
  use_silu: false
  use_pred_silu: false
  wide_silu: true
  use_activation_checkpointing: false
  init_type: default
  n_registers: 0
  n_registers_predictor: 0
  has_cls_first: false
  levels_predictor: 4       # number of hierarchical encoder layers to distil
  predict_all: true         # also predict context tokens (enables context loss λ)
  lambda_value: 0.5         # context loss coefficient
  lambda_progressive: true  # ramp λ from 0 → lambda_value linearly
  normalize_predictor: false

optimization:
  ema: [0.999, 0.999]       # [start, end] momentum for target encoder EMA
  epochs: 1000
  lr: 0.0001
  start_lr: 0.00001
  final_lr: 0.0001
  weight_decay: 0.01
  final_weight_decay: 0.01
  warmup: 20                # epochs of LR warmup
  ipe: 2400                 # iterations per epoch (overrides dataset length)
  # ipe: 1250                 # iterations per epoch (overrides dataset length)
  ipe_scale: 1.25
  betas: [0.9, 0.999]
  eps: 1.0e-8
  effective_batch_size: 128   # gradient accumulation: 128 / batch_size(16) = 8 steps

loss:
  loss_exp: 1.0             # 1.0 = smooth-L1 style; 2.0 = L2
  shift_by_n: 0
  weight_distance_loss: true
